name: noports

packages:
  - packages/dart/noports_core
  - packages/dart/sshnoports
  - packages/dart/npt_flutter

command:
  bootstrap:
    runPubGetInParallel: false
    hooks:
      post: |
        dart run melos exec \
        --scope="noports_core" \
        --scope="sshnoports" \
        --scope="npt_flutter" \
        -- "dart run build_runner build --delete-conflicting-outputs"
