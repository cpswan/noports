name: Bump requirements.txt
on:
  pull_request:
    paths:
      - 'packages/python/sshnpd/pyproject.toml'
  workflow_dispatch:

# Declare default permissions as read only.
permissions: read-all

jobs:
  bump_requirements:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
    - name: Checkout this repo
      if: ${{ github.actor == 'dependabot[bot]' }}
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.MY_GITHUB_TOKEN }}

    - name: Set up Python
      if: ${{ github.actor == 'dependabot[bot]' }}
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
          python-version: '3.11'

    - name: Install Poetry
      if: ${{ github.actor == 'dependabot[bot]' }}
      uses: abatilo/actions-poetry@e78f54a89cb052fff327414dd9ff010b5d2b4dbd # v3.0.1
      with:
        poetry-version: '1.8.3'

    - name: Bump sshnpd Python dependencies
      working-directory: packages/python/sshnpd
      if: ${{ github.actor == 'dependabot[bot]' }}
      run: |
        poetry update
        poetry export --format requirements.txt --output requirements.txt
        git config --global user.name 'dependabot[bot]'
        git config --global user.email 'dependabot[bot]@users.noreply.github.com'
        git add requirements.txt
        if [ -z "$(git status --porcelain)" ]; then 
          echo 'No changes to commit on this run'
          exit 0
        else
          poetry version patch
          git add pyproject.toml
          git commit -m "build(deps): Bump sshnpd requirements.txt and poetry version"
          git push
        fi
