name: C Unit Tests

on:
  workflow_dispatch:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

permissions: # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  unit-tests:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

        # Pin cmake to <4.0.0
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@802fa1a2c4e212495c05bf94dba2704a92a472be
        with:
          cmake-version: "3.31.6"

      - name: sshnpd Unit CTest
        working-directory: packages/c
        run: |
          cmake -S . -B build -DSSHNPD_BUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build/sshnpd/tests --output-on-failure --timeout 2
